version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: appbd
      POSTGRES_USER: wooxxtttyy
    healthcheck:  
      test: ["CMD-SHELL", "pg_isready -U wooxxtttyy -d appbd"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck: 
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    # ports: 
    #   - "8001:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: appbd  
      DB_USER: wooxxtttyy  
      DB_PASSWORD: 1 
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy  
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:z
    depends_on:
      - app
  
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards

  node-exporter:
    image: prom/node-exporter
    ports:
      - "9100:9100"
    depends_on:
      - app

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://wooxxtttyy:1@postgres:5432/appbd?sslmode=disable"
    ports:
      - "9187:9187"

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter
    command:
      - '-nginx.scrape-uri=http://nginx:80/stub_status'
    ports:
      - "9113:9113"

volumes:
  pgdata:
  prometheus_data:
  grafana_data: